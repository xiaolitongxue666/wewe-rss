version: '3.9'

services:
  app:
    image: cooderl/wewe-rss-sqlite:latest
    ports:
      - 4000:4000
    environment:
      # 数据库连接地址（SQLite 镜像默认使用 /app/data，一般无需改）
      # - DATABASE_URL=file:../data/wewe-rss.db
      - DATABASE_TYPE=sqlite
      # 可由 compose.env 覆盖（见 compose.env.example）
      - AUTH_CODE=${AUTH_CODE:-123567}
      # 提取全文内容模式
      # - FEED_MODE=fulltext
      # 定时更新订阅源Cron表达式
      # - CRON_EXPRESSION=35 5,17 * * *
      # 服务接口请求限制，每分钟请求次数
      # - MAX_REQUEST_PER_MINUTE=60
      # 生成 RSS 自链接等（本地默认 localhost）
      - SERVER_ORIGIN_URL=${SERVER_ORIGIN_URL:-http://localhost:4000}

    volumes:
      # 映射数据库文件存储位置，容器重启后不丢失
      - ./data:/app/data
